general {
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = ~/Pictures/wallpapers/wald.jpg   # or screenshot
    blur_passes = 3
    contrast = 0.7
    brightness = 0.8172
    vibrancy = 0.3
    vibrancy_darkness = 0.0
}


label {
    monitor =
    text = cmd[update:997] TZ=Europe/Vienna date +"%H:%M"
    font_size = 120
    position = 0, 80
    halign = center
    valign = center
}
